name: Release

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-data:
    name: Update CutoffData.lua
    runs-on: ubuntu-latest
    if: github.event_name != 'push'
    outputs:
      data_changed: ${{ steps.commit_data.outputs.data_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update_cutoffs.py
        env:
          RAIDER_IO_API_KEY: ${{ secrets.RAIDER_IO_API_KEY }}
        run: python update_cutoffs.py

      - name: Commit and push CutoffData.lua (if changed)
        id: commit_data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CutoffData.lua
          if git diff --cached --quiet; then
            echo "No changes to CutoffData.lua - skipping commit."
            echo "data_changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): refresh CutoffData.lua [skip ci]"
            git push
            echo "data_changed=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Package and Release
    runs-on: ubuntu-latest
    needs: update-data
    if: |
      always() && (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        (github.event_name != 'push' && needs.update-data.outputs.data_changed == 'true')
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'push' && github.ref || 'main' }}

      - name: Build and release with BigWigs packager
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CURSEFORGE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
