name: Release

# ─── Triggers ───────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "0 8 * * *"      # Daily at 08:00 UTC — fetches fresh Raider.IO cutoffs.
  workflow_dispatch:          # Manual trigger from the Actions tab.
  push:
    tags:
      - "v*"                  # Run on every version tag push (e.g. v1.2.3).

# ─── Permissions ────────────────────────────────────────────────────────────
# `contents: write` is required so the update-data job can push CutoffData.lua
# back to the default branch when the cron / manual run picks up fresh data.
permissions:
  contents: write

# Cancel duplicate runs on the same ref — keeps the Actions tab tidy.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # 1. Refresh CutoffData.lua and commit it back (only on scheduled / manual
  #    runs — skipped on tag pushes because the data is already frozen into
  #    whatever commit you tagged).
  # ──────────────────────────────────────────────────────────────────────────
  update-data:
    name: Update CutoffData.lua
    runs-on: ubuntu-latest
    if: github.event_name != 'push'    # Skip when triggered by a tag push.
    outputs:
      data_changed: ${{ steps.commit_data.outputs.data_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0                # Full history so git push works cleanly.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update_cutoffs.py
        env:
          RAIDER_IO_API_KEY: ${{ secrets.RAIDER_IO_API_KEY }}
        run: python update_cutoffs.py

      - name: Commit & push CutoffData.lua (if changed)
        id: commit_data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CutoffData.lua
          if git diff --cached --quiet; then
            echo "No changes to CutoffData.lua — skipping commit."
            echo "data_changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): refresh CutoffData.lua [skip ci]"
            git push
            echo "data_changed=true" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────────────────────────────────
  # 2. On scheduled/manual runs, auto-create a version tag when new cutoff
  #    data was committed. The tag push triggers a second workflow run, and
  #    that run performs packaging/upload.
  # ──────────────────────────────────────────────────────────────────────────
  auto-tag-release:
    name: Create auto release tag
    runs-on: ubuntu-latest
    needs: update-data
    if: needs.update-data.outputs.data_changed == 'true'

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Create and push auto tag
        run: |
          git fetch --tags
          TAG="v$(date -u +'%Y.%m.%d.%H%M')"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG="${TAG}.${GITHUB_RUN_NUMBER}"
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created tag: $TAG"

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Package and upload only when this workflow is triggered by a version
  #    tag push.
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Package & Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository (with latest CutoffData.lua)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}        # Pick up the commit from update-data.

      - name: Build & release with BigWigsMods packager
        uses: BigWigsMods/packager@v2
        env:
          # BigWigsMods/packager reads this env var to authenticate with CurseForge.
          # The project ID itself lives in .pkgmeta (curse-project-id: ...).
          CF_API_KEY: ${{ secrets.CURSEFORGE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment if you also publish to Wago.io or WoWInterface:
          # WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          # WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
